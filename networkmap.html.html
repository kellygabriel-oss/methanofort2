<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MethanoFort Network Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Courier New',monospace; background:#0a1628; color:#00e5ff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  #header { background:linear-gradient(135deg,#0d2137,#0a1628); border-bottom:2px solid #00e5ff33; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header-title { font-size:13px; font-weight:bold; letter-spacing:2px; color:#00e5ff; text-shadow:0 0 12px #00e5ff88; }
  .header-subtitle { font-size:9px; color:#00e5ff66; letter-spacing:1px; margin-top:2px; }
  .network-status { display:flex; align-items:center; gap:6px; font-size:9px; color:#00ff88; letter-spacing:1px; }
  .pulse-dot { width:8px; height:8px; background:#00ff88; border-radius:50%; animation:pulse 1.5s ease-in-out infinite; box-shadow:0 0 6px #00ff88; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  #map-wrapper { flex:1; position:relative; overflow:hidden; }
  #map { width:100%; height:100%; }

  #offline-map { display:none; width:100%; height:100%; position:relative; background:#0a1e34; }
  #sg-silhouette { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:480px; opacity:0.45; filter:hue-rotate(140deg) saturate(0.8) brightness(0.6); }
  .pin-wrapper { position:absolute; transform:translate(-50%,-50%); z-index:10; cursor:pointer; }
  .pin { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; border:2px solid transparent; }
  .pin-operational { background:#00ff8833; border-color:#00ff88; box-shadow:0 0 10px #00ff8888; animation:pinGlow 2s ease-in-out infinite; }
  .pin-alert { background:#ff950033; border-color:#ff9500; box-shadow:0 0 10px #ff950088; animation:pinGlow 2s ease-in-out infinite; }
  .pin-demo { background:#00e5ff33; border-color:#00e5ff; box-shadow:0 0 14px #00e5ffaa; animation:pinGlow 1s ease-in-out infinite; }
  @keyframes pinGlow { 0%,100%{opacity:1} 50%{opacity:0.55} }

  /* Shared popup */
  #popup { display:none; position:absolute; z-index:200; width:230px; background:#0d2137f2; border:1px solid #00e5ff55; border-radius:8px; padding:12px; box-shadow:0 0 24px #00e5ff44; color:#e0f7ff; font-size:10px; }
  .popup-name { font-size:12px; font-weight:bold; color:#00e5ff; letter-spacing:1px; margin-bottom:3px; }
  .popup-loc  { font-size:9px; color:#00e5ff88; margin-bottom:6px; }
  .popup-row  { display:flex; justify-content:space-between; margin:3px 0; color:#b0d4e8; }
  .popup-row span:last-child { font-weight:bold; }
  .status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:9px; font-weight:bold; letter-spacing:1px; margin:4px 0 8px; }
  .status-operational { background:#00ff8822; color:#00ff88; border:1px solid #00ff8855; }
  .status-alert { background:#ff6b0022; color:#ff9500; border:1px solid #ff950055; }
  .status-demo { background:#00e5ff22; color:#00e5ff; border:1px solid #00e5ff55; }
  .popup-btn { width:100%; padding:7px; background:linear-gradient(135deg,#00e5ff22,#0066ff22); border:1px solid #00e5ff55; border-radius:6px; color:#00e5ff; font-family:'Courier New',monospace; font-size:10px; font-weight:bold; letter-spacing:1px; cursor:pointer; margin-top:4px; }
  .popup-close { position:absolute; top:6px; right:8px; cursor:pointer; color:#00e5ff; font-size:16px; line-height:1; }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper { background:#0d2137f2; border:1px solid #00e5ff55; border-radius:8px; box-shadow:0 0 20px #00e5ff33; color:#e0f7ff; font-family:'Courier New',monospace; min-width:215px; }
  .leaflet-popup-tip { background:#0d2137; }
  .leaflet-popup-close-button { color:#00e5ff!important; font-size:18px!important; top:6px!important; right:8px!important; }

  #statusbar { background:#0d2137; border-top:1px solid #00e5ff22; padding:6px 14px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; font-size:9px; letter-spacing:0.8px; }
  .stat-item { display:flex; align-items:center; gap:4px; color:#00e5ff99; }
  .stat-value { color:#00e5ff; font-weight:bold; }
  .stat-alert { color:#ff9500; font-weight:bold; }

  #legend { position:absolute; top:80px; left:8px; z-index:1000; background:#0d2137cc; border:1px solid #00e5ff33; border-radius:8px; padding:8px 10px; font-size:9px; letter-spacing:0.5px; }
  .legend-row { display:flex; align-items:center; gap:6px; margin:3px 0; color:#b0d4e8; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  #back-btn { position:absolute; bottom:8px; right:8px; z-index:1000; background:#0d2137ee; border:1px solid #00e5ff44; border-radius:8px; padding:8px 14px; color:#00e5ff; font-family:'Courier New',monospace; font-size:10px; letter-spacing:1px; cursor:pointer; }
  #mode-badge { position:absolute; top:8px; right:8px; z-index:1000; background:#0d2137cc; border:1px solid #00e5ff22; border-radius:6px; padding:4px 8px; font-size:8px; color:#00e5ff66; letter-spacing:1px; }
</style>
</head>

// ── STATUSBAR COUNTS ──────────────────────────────────────────
const total  = stations.length;
const active = stations.filter(s => s.status !== 'ALERT').length;
const alerts = stations.filter(s => s.status === 'ALERT').length;
document.getElementById('sb-total').textContent  = total;
document.getElementById('sb-active').textContent = active;
document.getElementById('sb-alert').textContent  = alerts;

// ── MAP INIT ──────────────────────────────────────────────────
const map = L.map('map', { center:[1.3521,103.8198], zoom:11, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:18 }).addTo(map);

let tilesFailed = 0;
map.on('tileerror', () => { tilesFailed++; if(tilesFailed >= 3) switchToOffline(); });

// ── ICON FACTORY ──────────────────────────────────────────────
function makeIcon(color, glow, size) {
  size = size || 22;
  return L.divIcon({
    className:'',
    iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2+2],
    html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color}22;border:2px solid ${color};box-shadow:0 0 10px ${glow};display:flex;align-items:center;justify-content:center;font-size:${size*0.55}px;">📍</div>`
  });
}
const icons = {
  DEMO:        makeIcon('#00e5ff','#00e5ffaa', 26),
  OPERATIONAL: makeIcon('#00ff88','#00ff8888', 20),
  ALERT:       makeIcon('#ff9500','#ff950088', 22),
};

// ── POPUP HTML BUILDER ────────────────────────────────────────
function popupHtml(s) {
  const sc = s.status==='ALERT' ? 'status-alert' : s.status==='DEMO' ? 'status-demo' : 'status-operational';
  const btnLabel = s.hasDashboard ? '📊 OPEN STATION DASHBOARD →' : '📋 REQUEST ACCESS';
  return `<div>
    <div class="popup-name">${s.name}</div>
    <div class="popup-loc">📍 ${s.location}</div>
    <span class="status-badge ${sc}">${s.status}</span>
    <div class="popup-row"><span>🧪 pH</span><span>${s.ph}</span></div>
    <div class="popup-row"><span>💧 TDS</span><span>${s.tds}</span></div>
    <div class="popup-row"><span>🌊 Turbidity</span><span>${s.turbidity}</span></div>
    <div class="popup-row"><span>🌡 Temp</span><span>${s.temp}</span></div>
    <div class="popup-row"><span>⚡ DO</span><span>${s.do_}</span></div>
    <div class="popup-row"><span>⏱ Sync</span><span>${s.sync}</span></div>
    <button class="popup-btn" onclick="openStation('${s.id}','${s.hasDashboard}')">${btnLabel}</button>
  </div>`;
}

// ── PLACE MARKERS ─────────────────────────────────────────────
stations.forEach(s => {
  const icon = icons[s.status] || icons.OPERATIONAL;
  const m = L.marker([s.lat, s.lng], {icon}).addTo(map);
  m.bindPopup(popupHtml(s), {maxWidth:250});
});

// ── OFFLINE FALLBACK ──────────────────────────────────────────
function switchToOffline() {
  document.getElementById('map').style.display = 'none';
  document.getElementById('offline-map').style.display = 'block';
  document.getElementById('mode-badge').textContent = '📴 OFFLINE';
  document.getElementById('live-label').textContent = 'OFFLINE';
  const container = document.getElementById('offline-map');
  stations.forEach(s => {
    const wrap = document.createElement('div');
    wrap.className = 'pin-wrapper';
    wrap.style.left = s.ox + '%';
    wrap.style.top  = s.oy + '%';
    const cls = s.status==='ALERT' ? 'pin-alert' : s.status==='DEMO' ? 'pin-demo' : 'pin-operational';
    wrap.innerHTML = `<div class="pin ${cls}">📍</div>`;
    wrap.onclick = (e) => showOfflinePopup(s, e);
    container.appendChild(wrap);
  });
}

function showOfflinePopup(s, e) {
  const p = document.getElementById('popup');
  const sc = s.status==='ALERT' ? 'status-alert' : s.status==='DEMO' ? 'status-demo' : 'status-operational';
  document.getElementById('p-name').textContent   = s.name;
  document.getElementById('p-loc').textContent    = '📍 ' + s.location;
  document.getElementById('p-status').textContent = s.status;
  document.getElementById('p-status').className   = 'status-badge ' + sc;
  document.getElementById('p-ph').textContent     = s.ph;
  document.getElementById('p-tds').textContent    = s.tds;
  document.getElementById('p-turb').textContent   = s.turbidity;
  document.getElementById('p-temp').textContent   = s.temp;
  document.getElementById('p-do').textContent     = s.do_;
  document.getElementById('p-sync').textContent   = s.sync;
  document.getElementById('p-btn').textContent    = s.hasDashboard ? '📊 OPEN STATION DASHBOARD →' : '📋 REQUEST Access';
  document.getElementById('p-btn').onclick        = () => openStation(s.id, s.hasDashboard);
  const rect = document.getElementById('map-wrapper').getBoundingClientRect();
  let left = e.clientX - rect.left + 12;
  let top  = e.clientY - rect.top  - 60;
  if(left + 240 > rect.width)  left = e.clientX - rect.left - 248;
  if(top  + 280 > rect.height) top  = e.clientY - rect.top  - 290;
  p.style.left = left + 'px'; p.style.top = top + 'px'; p.style.display = 'block';
}
function closePopup() { document.getElementById('popup').style.display='none'; }

// ── NAVIGATION ────────────────────────────────────────────────
function openStation(id, hasDashboard) {
  closePopup();
  if(hasDashboard === true || hasDashboard === 'true') {
    // Sends station ID to MIT App Inventor → open DashboardScreen
    try { AppInventor.setWebViewString("STATION:" + id); }
    catch(e) { alert("→ Opening dashboard for: " + id.toUpperCase()); }
  } else {
    // Future station — show coming soon
    try { AppInventor.setWebViewString("FUTURE:" + id); }
    catch(e) { alert("Station " + id.toUpperCase() + " is planned for future deployment. Dashboard coming soon."); }
  }
}
function goBack() {
  try { AppInventor.setWebViewString("BACK:DASHBOARD"); }
  catch(e) { alert("← Back to Main Dashboard"); }
}
